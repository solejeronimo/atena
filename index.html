<!DOCTYPE html>
<html>
<head>

<title>ATENA</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Helvetica, Arial;
background:white;
color:black;
}

header{
display:flex;
justify-content:space-between;
padding:25px 60px;
border-bottom:1px solid #eee;
}

.logo{
font-size:30px;
letter-spacing:6px;
}

.menu{
font-size:14px;
letter-spacing:2px;
}

.hero{
height:85vh;
background-image:url("https://images.unsplash.com/photo-1483985988355-763728e1935b");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:45px;
letter-spacing:5px;
}

.section{
padding:70px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

.product img{
width:100%;
}

.price{
font-weight:bold;
}

button{
background:black;
color:white;
border:none;
padding:12px 18px;
margin-top:10px;
cursor:pointer;
}

footer{
padding:40px;
border-top:1px solid #eee;
text-align:center;
font-size:12px;
}

</style>

</head>

<body>

<header>

<div class="logo">ATENA</div>

<div class="menu">
NEW IN &nbsp;&nbsp; VINTAGE &nbsp;&nbsp; JACKETS &nbsp;&nbsp; PANTS
</div>

</header>

<section class="hero">

VINTAGE ARCHIVE

</section>

<section class="section">

<h2>NEW IN</h2>

<div class="products">

<div class="product">

<img src="https://images.unsplash.com/photo-1520975922284-8b456906c813">

<p>Vintage Leather Jacket</p>

<p class="price">$95.000</p>

<a href="#">
<button>Comprar</button>
</a>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246">

<p>Levis 501 1998</p>

<p class="price">$85.000</p>

<a href="#">
<button>Comprar</button>
</a>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb">

<p>Vintage Denim Jacket</p>

<p class="price">$110.000</p>

<a href="#">
<button>Comprar</button>
</a>

</div>

</div>

</section>

<footer>

ATENA — Vintage Archive

</footer>

</body>
</html>
